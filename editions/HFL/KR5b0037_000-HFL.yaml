body:
  text: 志心敬禮虛無自然元始天尊志心敬禮太上大道玉晨道君志心敬禮太上玄元聖祖老君志心敬禮傾心合道靈寳天尊志心敬禮淨念脩眞靈寳天尊志心敬禮懴除惡跡靈寳天尊志心敬禮得離罪障靈寳天尊志心敬禮拔苦消障靈寳天尊志心敬軆拯濟幽冥靈寳天尊志心敬禮消滅苦輪靈寳天尊志心敬禮拯拔九幽靈寳天尊志心敬禮超昇五道靈寳天尊志心敬禮大慈大悲救苦眞人志心敬禮大慈大悲大惠眞人志心敬禮大慈大悲拔罪眞人志心敬禮大慈大悲普救眞人禮竟恢誠恭伸懺悔弟子臣某甲自念謬處人寰叨逢正化感天地覆載之恩荷日月照臨之德復思父母根宗生成養育念彼劬勞之大誠當薦拔之酬今對聖眞傾心懇禱伏願億曾萬祖亡過諸靈生前積劫之愆盡蒙原赦見沒淪漂之苦咸乞逍遙頓釋冤沉逐慧光而昇度遽登玄岸承符命以朝眞永離輸迴同生長樂天氣歸身常蒙道蔭臣無任哀誠懇禱之至道言清信男女薦亡祝生請福禳災切冝嚴謹香湯齋沐專意傾心禮誦眞經稱揚聖號精誠兼備必獲感通濟度存亡殃消福至若不恭不謹性惑心疑腥膻葷色不可開經沓口磨唇污于聖典徒勞無益又返招殃所謂修福不如避罪也若能書印此經散施學人流傳禮誦亡魂超度地獄寜閑福善所資度延後世其有珍玩服飾平昔資財廣施寒棲濟恤貧乏此之功德亦類於前黑籍落名地司除簡神昇淨上隨願往生利祐子孫斷絶殃疰巍巍福善難可稱量是故應當勤心諦受宣行禮念普度無窮依教奉持復當敬禮一切天尊志心敬禮虚无自然元始天尊志心敬禮太上大道玉晨道君志心敬禮太上玄元聖祖老君志心敬禮當善救物天尊志心敬禮无量度人天尊志心敬禮拯迷拔滯天尊志心敬禮玄化利生天尊志心敬禮金闕濟度天尊志心敬禮无礙自在天尊志心敬禮愍生利物天尊志心敬禮巨功弘濟天尊志心敬禮雨寳濟乏天尊志心敬禮超度无極天尊志心敬禮愛物救世天尊志心敬禮功德无量天尊志心敬禮迴尸起骨天尊志心敬禮煉質登眞天尊志心敬禮玄元闡教天尊志心敬禮道德度人天尊志心敬禮消災延壽天尊志心敬禮宥福續命眞人志心敬禮真靜圓功真人志心敬禮修真成道真人禮竟恢誠恭仲禱謝弟子臣某甲伏聞行成之内孝敬爲先教法之中修齋是本欲報慈親之德須思禱祝之方將酬罔極之恩是列嚴持之供大凡人世俱逼名利爲端既懷取捨之謀寜免貪癡之咎致使命辤一世魂寄九幽敢憑上善之因庶拔漂沉之苦是則心存哀懇志薦先亡宣金匱之靈章仰祈眞聖禮髙虚之御號俯答根宗伏願承斯道力廣濟沉淪滅无量之罪尤均開長夜賜大天之鴻宥普及群生億曽萬祖俱獲遂於飛昇積債疊寃並乞蒙於超適然冀居家長幼眷屬親姻常沾吉慶之祈求荷虚无之蔭臣无任瞻天望聖激切屏營之至道言玄經周畢可以傳教世間廣垂濟度爾時會衆聞此法緣洞逹无爲齊昇道果酆幽諸獄无量罪魂俱獲善功應時解脱諸天仙衆歡喜敬奉作禮而退上清金匱玉鏡修眞指玄妙經
