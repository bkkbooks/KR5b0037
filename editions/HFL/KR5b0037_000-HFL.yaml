front:
  text: 上清金匱玉鏡修真指玄妙經乃三太上道君於上清玉虚洞紫霄林中與諸天仙衆三界眞官俱在會坐說此修眞指玄眞經吿仙衆曰下方衆生不知正道作諸罪障沉沒无邊造罪者不知洗滌修養者全乖正道是致惡道盈塗生門絶跡吾今爲汝宣說要言直剖玄元之㫖付傳清信之流修身保命安國寧家行滿功成身超三界昇拔根祖慶延子孫祕典靈章宜加諦聽道君曰天地絪緼萬物化醇承其宿業因縁運會父母和合人受其生胎完炁足虚中降神太一居腦以鎭泥丸司命處心以納生源左居无英右結白元三眞九宫布列俱全肝䰟肺𩲸脾志腎精心主藏神丹元守靈法天象地負隂抱陽分錯五行以應四時眼爲日月髮爲星辰眉號華蓋頭即崑崙各有宫闕安置精神萬物之中最貴而靈命生於道性禀於一物生之時神乎清靜洎乎朴散逐妄耗眞不淨臭穢濁亂形神靜觀物我何踈何親守道全生爲善保眞愚役於物徒自苦辛吾敷正敎惟勗賢英勤尋㫖趣日煉時烹能除罪垢可以延齡上超三界下拔幽冥誦持禮念無退前程功成行就必證長生道言心爲形主神所居焉炁液血精心安自治其政悶悶其民淳淳其政察察其民缺缺養心之道愼于多事傲不可長欲不可從志不可滿樂不可極罪莫大於可欲禍莫大於不知足若能安分止貪虚心遣欲則眞源湛然靈光自瑩无思无爲漸合眞道矣道言炁以形載形以炁充形完則炁留炁和則形保天地以清濁爲質非炁不足以運隂陽日月以眀暗分形非炁不足以交魂魄衆植彫殘獨松栢之常茂者炁堅也羣動滅寂惟龜鶴之不悴者炁住也形爲留炁之舍炁是保形之符欲留形住世必先養炁至大至剛充塞乎天地之間炁聚炁靈遨遊乎風塵之外故知炁在人中人在炁中天地萬物莫不由炁以生者也善養炁者内以養身外以𨚫惡百姓日用而不知焉知之脩煉黙而成之可救饑寒可辟邪癘惡蟲毒物炁能禁之萬法千術惟炁是祖養炁之道要在愼言節食懲忿窒欲塞其兌閉其門綿綿若存用之不勤養形之道要在挫銳和光治於未亂安而不勞勞而不乏其力靜而不撓撓而不亂其炁外有所補内有所益養形保炁於斯備矣道言形炁具立當保精神造化之機在於是矣然精全則神王精耗則神衰以精集神而神保以神使形而形安腎爲精府太用則竭專而嗇之可也心爲神舍太用則勞靜而養之可也惟靜與專然可内守故曰至道之眞杳杳㝠㝠至道之極昏昏黙黙無視無聽抱神以靜形將自正必静必清無勞汝形無揺汝精少私寡慾乃可長生道言法本無法理歸自然心因境亂法本心生立法之意救補巳失而防於未萌若人犯破三竒即先補治補之完備然可進功不完而進徒勞無益補治之法混元具說其玄程功之方靈寳畢言其妙前功見驗可進次功功滿成眞髙卑隨行有功無行魔障難成有行持功仙眞自舉善功圓滿以降吉祥性旁修行明分等級欲求天仙者當立一千三百善欲求地仙者當立三百善是道則進非道則退不履邪徑不欺闇室積行累功慈心於物忠孝友睦正己化人矜孤恤寡敬老懷㓜昆蟲草木亦不可傷如此所謂善人人皆敬之天道祐之福禄隨之衆邪逺之所作必成神仙可冀矣道言夫欲修道先須停除停者一物不生除者萬縁俱息然後收神炁海藏息丹田成性存眞兀然泰定如此乆之則自己元始天尊晏寂於空玄之座三萬六千神識咸朝於寳珠之中夫如是則二景合炁交神於十華之鼎男女傾心媾精於五炁之爐以至移精𢒟音變氣噏張於玄牝之門專炁抱神烹鍊於雄雌之器自然髮白返黑齒落重生還童復嬰長生乆視全命保生以合於道當與天地齊其堅固同長乆矣道言夫學道之士立德立功錬氣坐忘修眞服御宣經演教佐國度人種種皆修是其行業功行雖備果業雖圓亦須先度九玄七祖父母亡靈遷拔生天鬼録盡除身方得道况復世界流俗之人造惡積愆殃及根祖吾今悲𢚓宣說要言薦拔冥魂須憑功德可於三清像側裝衣亡人形像如法書九眞妙印今彼亡人卷而載之即禮此經懴一日三部如不能懺毎日志心持念尋聲救苦天尊三千遍凡百遍訖禮九拜即云願度某人魂神早離幽隂超昇天界罪輕者三日得度罪重者九日遷昇孝順男女切宜哀懇至心禮聖
